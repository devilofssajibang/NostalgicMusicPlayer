name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Packages
        run: xcodebuild -resolvePackageDependencies

      - name: List schemes
        run: xcodebuild -list

      - name: Archive
        run: |
          xcodebuild \
            -scheme NostalgicMusicPlayer \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/NostalgicMusicPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Create Payload
        run: |
          mkdir Payload
          cp -R build/NostalgicMusicPlayer.xcarchive/Products/Applications/*.app Payload/

      - name: Pack IPA
        run: |
          cd Payload
          zip -r ../NostalgicMusicPlayer.ipa .

      - uses: actions/upload-artifact@v4
        with:
          name: NostalgicMusicPlayer
          path: NostalgicMusicPlayer.ipa
